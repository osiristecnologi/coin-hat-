<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent IDE OS</title>
<style>
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-tertiary: #0f3460;
    --bg-editor: #1a1a2e;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --accent: #00d4aa;
    --accent-hover: #00b894;
    --danger: #ff6b6b;
    --warning: #feca57;
    --info: #54a0ff;
    --border: #2d2d44;
    --sidebar-width: 260px;
    --topbar-height: 40px;
    --tab-height: 36px;
    --console-height: 220px;
    --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    --font-ui: 'Inter', 'Segoe UI', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-ui);
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ═══════════════ TOP BAR ═══════════════ */
  #topbar {
    height: var(--topbar-height);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    flex-shrink: 0;
  }

  #topbar .logo {
    font-weight: 800;
    font-size: 15px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #topbar .logo span.icon {
    font-size: 18px;
  }

  #topbar .breadcrumb {
    font-size: 12px;
    color: var(--text-secondary);
    padding: 2px 10px;
    background: var(--bg-tertiary);
    border-radius: 4px;
  }

  #topbar .status {
    margin-left: auto;
    font-size: 11px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #topbar .status .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ═══════════════ MAIN LAYOUT ═══════════════ */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ═══════════════ SIDEBAR ═══════════════ */
  #sidebar {
    width: var(--sidebar-width);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: width 0.3s ease;
    overflow: hidden;
  }

  #sidebar.collapsed { width: 40px; }

  .sidebar-header {
    padding: 12px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .sidebar-header button {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 14px;
    transition: color 0.2s;
  }

  .sidebar-header button:hover { color: var(--accent); }

  #file-tree {
    flex: 1;
    padding: 8px 0;
    overflow-y: auto;
  }

  .file-item {
    display: flex;
    align-items: center;
    padding: 6px 16px;
    cursor: pointer;
    font-size: 13px;
    gap: 8px;
    transition: all 0.15s ease;
    border-left: 3px solid transparent;
    color: var(--text-secondary);
  }

  .file-item:hover {
    background: rgba(255,255,255,0.04);
    color: var(--text-primary);
  }

  .file-item.active {
    background: rgba(0, 212, 170, 0.08);
    border-left-color: var(--accent);
    color: var(--accent);
  }

  .file-item .file-icon {
    font-size: 14px;
    width: 20px;
    text-align: center;
  }

  .file-item .file-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-item .file-badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 8px;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
  }

  /* ═══════════════ EDITOR AREA ═══════════════ */
  #editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* ─── TABS ─── */
  #tabs-bar {
    height: var(--tab-height);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    overflow-x: auto;
    flex-shrink: 0;
  }

  .tab {
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    cursor: pointer;
    border-right: 1px solid var(--border);
    color: var(--text-secondary);
    transition: all 0.15s;
    white-space: nowrap;
    min-width: max-content;
    position: relative;
  }

  .tab:hover { background: rgba(255,255,255,0.03); color: var(--text-primary); }

  .tab.active {
    background: var(--bg-editor);
    color: var(--accent);
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .tab .tab-close {
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s;
    padding: 2px;
    border-radius: 3px;
  }

  .tab:hover .tab-close { opacity: 0.7; }
  .tab .tab-close:hover { opacity: 1; color: var(--danger); }

  /* ─── EDITOR ─── */
  #editor-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  #editor-wrapper {
    flex: 1;
    display: flex;
    position: relative;
    overflow: hidden;
  }

  #line-numbers {
    width: 45px;
    background: rgba(0,0,0,0.2);
    padding: 12px 8px;
    text-align: right;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    color: #475569;
    user-select: none;
    overflow: hidden;
    flex-shrink: 0;
  }

  #code-editor {
    flex: 1;
    background: var(--bg-editor);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 12px 16px;
    border: none;
    outline: none;
    resize: none;
    tab-size: 2;
    white-space: pre;
    overflow: auto;
  }

  #code-editor::selection {
    background: rgba(0, 212, 170, 0.25);
  }

  /* ═══════════════ PREVIEW PANEL ═══════════════ */
  #preview-panel {
    display: none;
    flex: 1;
    flex-direction: column;
    min-width: 0;
  }

  #preview-panel.active { display: flex; }

  .preview-header {
    height: 32px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 11px;
    color: var(--text-secondary);
    gap: 8px;
  }

  .preview-header .preview-btn {
    margin-left: auto;
    background: var(--accent);
    color: var(--bg-primary);
    border: none;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-weight: 600;
  }

  .preview-header .preview-btn:hover { background: var(--accent-hover); }

  #preview-frame {
    flex: 1;
    border: none;
    background: #fff;
  }

  /* ═══════════════ CONSOLE ═══════════════ */
  #console-panel {
    height: var(--console-height);
    background: #0d1117;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: height 0.3s ease;
  }

  #console-panel.collapsed {
    height: 36px;
    overflow: hidden;
  }

  .console-header {
    height: 32px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 11px;
    color: var(--text-secondary);
    gap: 12px;
    flex-shrink: 0;
    cursor: pointer;
  }

  .console-header .tab-label {
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .console-header .tab-label:hover { background: rgba(255,255,255,0.05); }
  .console-header .tab-label.active { background: rgba(0,212,170,0.15); color: var(--accent); }

  .console-header .toggle-console {
    margin-left: auto;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.3s;
  }

  #console-panel.collapsed .toggle-console { transform: rotate(180deg); }

  #console-output {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.5;
    color: #8b949e;
  }

  #console-output .log-entry {
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }

  #console-output .log-entry.system { color: #54a0ff; }
  #console-output .log-entry.success { color: var(--accent); }
  #console-output .log-entry.error { color: var(--danger); }
  #console-output .log-entry.warning { color: var(--warning); }
  #console-output .log-entry.agent { color: #c792ea; }

  #console-input-area {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
    gap: 8px;
    flex-shrink: 0;
  }

  #console-input-area .prompt {
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
  }

  #agent-input {
    flex: 1;
    background: var(--bg-primary);
    color: var(--text-primary);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  #agent-input:focus { border-color: var(--accent); }
  #agent-input::placeholder { color: #475569; }

  #send-btn {
    background: var(--accent);
    color: var(--bg-primary);
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }

  #send-btn:hover { background: var(--accent-hover); }

  /* ═══════════════ BOTTOM BAR ═══════════════ */
  #bottombar {
    height: 24px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 11px;
    color: var(--text-secondary);
    gap: 16px;
    flex-shrink: 0;
  }

  #bottombar .section { display: flex; align-items: center; gap: 4px; }
  #bottombar .spacer { margin-left: auto; }

  /* ═══════════════ BUTTONS ═══════════════ */
  .btn-copy {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 10;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }

  .btn-copy:hover { background: var(--accent); color: var(--bg-primary); }

  /* ═══════════════ ACTION BAR ═══════════════ */
  .action-bar {
    display: flex;
    gap: 6px;
    padding: 6px 12px;
    background: rgba(0,0,0,0.15);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .action-btn {
    background: rgba(255,255,255,0.06);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .action-btn:hover { background: rgba(0,212,170,0.15); color: var(--accent); border-color: var(--accent); }

  /* ═══════════════ MODAL ═══════════════ */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 400px;
    max-width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .modal h3 {
    color: var(--accent);
    margin-bottom: 12px;
    font-size: 16px;
  }

  .modal input {
    width: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 12px;
    outline: none;
  }

  .modal input:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .modal-actions button {
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.2s;
  }

  .modal-actions .btn-primary {
    background: var(--accent);
    color: var(--bg-primary);
    border-color: var(--accent);
  }

  .modal-actions .btn-secondary {
    background: transparent;
    color: var(--text-secondary);
  }

  /* ═══════════════ SCROLLBAR ═══════════════ */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2d2d44; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3d3d54; }

  /* ═══════════════ TOAST ═══════════════ */
  .toast {
    position: fixed;
    bottom: 40px;
    right: 20px;
    background: var(--bg-secondary);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    z-index: 200;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* ═══════════════ SYNTAX COLORS ═══════════════ */
  .token-tag { color: #ff79c6; }
  .token-attr { color: #50fa7b; }
  .token-val { color: #f1fa8c; }
  .token-comment { color: #6272a4; }
  .token-keyword { color: #ff79c6; }
  .token-string { color: #f1fa8c; }
  .token-number { color: #bd93f9; }
  .token-property { color: #50fa7b; }
  .token-selector { color: #8be9fd; }

  /* ═══════════════ ANIMATIONS ═══════════════ */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeIn 0.3s ease; }
</style>
</head>
<body>

<!-- ═══════════════ TOP BAR ═══════════════ -->
<div id="topbar">
  <div class="logo">
    <span class="icon">⚡</span> Agent IDE OS
  </div>
  <div class="breadcrumb" id="breadcrumb">project-ide/index.html</div>
  <div class="status">
    <span class="dot"></span>
    Agent Online
  </div>
</div>

<!-- ═══════════════ MAIN ═══════════════ -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      Explorer
      <button onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
    </div>
    <div id="file-tree"></div>
  </div>

  <!-- EDITOR PANEL -->
  <div id="editor-panel">
    <div id="tabs-bar"></div>
    <div class="action-bar">
      <button class="action-btn" onclick="previewCode()">▶ Preview</button>
      <button class="action-btn" onclick="togglePreview()">👁 HTML Preview</button>
      <button class="action-btn" onclick="formatCode()">✨ Formatar</button>
      <button class="action-btn" onclick="downloadProject()">⬇ Baixar</button>
      <button class="action-btn" onclick="showNewFileModal()">+ Novo Arquivo</button>
    </div>
    <div id="editor-container">
      <button class="btn-copy" onclick="copyCode()">📋 Copiar Código</button>
      <div id="editor-wrapper">
        <div id="line-numbers"></div>
        <textarea id="code-editor" spellcheck="false" autocapitalize="off"></textarea>
      </div>
    </div>

    <!-- PREVIEW PANEL -->
    <div id="preview-panel">
      <div class="preview-header">
        <span>🌐 Preview do Browser</span>
        <button class="preview-btn" onclick="refreshPreview()">↻ Recarregar</button>
      </div>
      <iframe id="preview-frame" sandbox="allow-scripts"></iframe>
    </div>

    <!-- CONSOLE -->
    <div id="console-panel">
      <div class="console-header" onclick="toggleConsole()">
        <span class="tab-label active" onclick="event.stopPropagation();">AGENT CONSOLE</span>
        <span class="tab-label" onclick="event.stopPropagation();">OUTPUT</span>
        <span class="toggle-console">▲</span>
      </div>
      <div id="console-output"></div>
      <div id="console-input-area">
        <span class="prompt">agent &gt;</span>
        <input type="text" id="agent-input" placeholder='Digite um comando... ex: "site dark", "criar site chamado X"' autocomplete="off">
        <button id="send-btn" onclick="processAgentCommand()">⏎</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ BOTTOM BAR ═══════════════ -->
<div id="bottombar">
  <div class="section">⚡ v1.0.0</div>
  <div class="section" id="file-info">index.html</div>
  <div class="section" id="char-count">0 caracteres</div>
  <div class="spacer"></div>
  <div class="section">UTF-8</div>
  <div class="section">JavaScript</div>
</div>

<!-- ═══════════════ MODAL ═══════════════ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal fade-in" id="modal-content"></div>
</div>

<!-- ═══════════════ TOAST ═══════════════ -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════
// Agent IDE OS — JavaScript Core
// ══════════════════════════════════════════════════════════════════

const IDE = {
  files: {},
  activeFile: null,
  openTabs: [],
  commandHistory: [],
  historyIndex: -1,
  consoleCollapsed: false,

  // ═══════════════ DEFAULT FILES ═══════════════
  initFiles() {
    this.files = {
      'index.html': {
        language: 'html',
        content: `<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Bem-vindo ao Meu Site</h1>
    <p>Este site foi criado com Agent IDE OS</p>
    <button onclick="alert('Olá!')">Clique aqui</button>
  </div>
  <script src="agent.js"><\/script>
</body>
</html>`
      },
      'style.css': {
        language: 'css',
        content: `* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #1a1a2e;
  color: #e2e8f0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  text-align: center;
  padding: 40px;
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 16px;
  color: #00d4aa;
}

p {
  font-size: 1.1rem;
  margin-bottom: 24px;
  color: #94a3b8;
}

button {
  padding: 12px 28px;
  font-size: 1rem;
  background: #00d4aa;
  color: #1a1a2e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: background 0.3s;
}

button:hover {
  background: #00b894;
}`
      },
      'server.js': {
        language: 'javascript',
        content: `// Servidor Node.js simulado
const express = require('express');
const app = express();
const PORT = 3000;

// Middleware
app.use(express.json());
app.use(express.static('public'));

// Rotas
app.get('/', (req, res) => {
  res.sendFile(__dirname + '/index.html');
});

app.get('/api/status', (req, res) => {
  res.json({
    status: 'online',
    uptime: process.uptime(),
    timestamp: new Date().toISOString()
  });
});

app.listen(PORT, () => {
  console.log(\`Servidor rodando em http://localhost:\${PORT}\`);
});`
      },
      'agent.js': {
        language: 'javascript',
        content: `// Agent.js — Motor de Inteligência
const Agent = {
  name: 'Agent IDE OS',
  version: '1.0.0',

  commands: {
    'site dark': () => {
      document.body.style.background = '#1a1a2e';
      document.body.style.color = '#e2e8f0';
    },
    'site light': () => {
      document.body.style.background = '#f0f0f0';
      document.body.style.color = '#333';
    },
    'alerta': (msg) => {
      alert(msg || 'Olá do Agent!');
    }
  },

  execute(command, ...args) {
    if (this.commands[command]) {
      return this.commands[command](...args);
    }
    console.warn('Comando não encontrado:', command);
  },

  init() {

  // ═══════════════ RENDER FILE TREE ═══════════════

    const tree = document.getElementById('file-tree');
    const icons = {
      html: '🌐',
      css: '🎨',
      javascript: '⚙️',
      json: '📋',
      md: '📝',
      default: '📄'
    };

    tree.innerHTML = '';
    Object.keys(this.files).forEach(filename => {
      const lang = this.files[filename].language;
      const icon = icons[lang] || icons.default;
      const isActive = filename === this.activeFile ? 'active' : '';

      const item = document.createElement('div');
      item.className = `file-item ${isActive}`;
      item.onclick = () => this.openFile(filename);
      item.innerHTML = `
        <span class="file-icon">${icon}</span>
        <span class="file-name">${filename}</span>
        <span class="file-badge">${lang}</span>
      `;
      tree.appendChild(item);
    });
  },

  // ═══════════════ RENDER TABS ═══════════════
  renderTabs() {
    const tabsBar = document.getElementById('tabs-bar');
    tabsBar.innerHTML = '';

    this.openTabs.forEach(filename => {
      const tab = document.createElement('div');
      tab.className = `tab ${filename === this.activeFile ? 'active' : ''}`;
      tab.innerHTML = `
        <span>${filename}</span>
        <span class="tab-close" onclick="event.stopPropagation(); IDE.closeTab('${filename}')">×</span>
      `;
      tab.onclick = () => this.openFile(filename);
      tabsBar.appendChild(tab);
    });
  },

  // ═══════════════ OPEN FILE ═══════════════
  openFile(filename) {
    if (!this.files[filename]) return;

    // Save current file content
    if (this.activeFile && this.files[this.activeFile]) {
      this.files[this.activeFile].content = document.getElementById('code-editor').value;
    }

    this.activeFile = filename;

    if (!this.openTabs.includes(filename)) {
      this.openTabs.push(filename);
    }

    // Update editor
    const editor = document.getElementById('code-editor');
    editor.value = this.files[filename].content;

    this.renderFileTree();
    this.renderTabs();
    updateLineNumbers();
    updateCharCount();
    updateBreadcrumb();
    updateBottomBarInfo();
  },

  // ═══════════════ CLOSE TAB ═══════════════
  closeTab(filename) {
    this.openTabs = this.openTabs.filter(t => t !== filename);

    if (this.activeFile === filename) {
      if (this.openTabs.length > 0) {
        this.openFile(this.openTabs[this.openTabs.length - 1]);
      } else {
        // Create empty default
        this.files['untitled.txt'] = { language: 'text', content: '' };
        this.activeFile = 'untitled.txt';
        this.openTabs = ['untitled.txt'];
        this.openFile('untitled.txt');
      }
    } else {
      this.renderTabs();
    }
  },

  // ═══════════════ PREVIEW ═══════════════
  preview() {
    const editor = document.getElementById('code-editor');
    const currentContent = editor.value;

    if (this.activeFile && this.files[this.activeFile]) {
      this.files[this.activeFile].content = currentContent;
    }

    // Build full preview
    let htmlContent = this.files['index.html']?.content || '';
    const cssContent = this.files['style.css']?.content || '';
    const jsContent = this.files['agent.js']?.content || '';

    // Replace link href with inline style
    htmlContent = htmlContent.replace(
      /<link\s+rel="stylesheet"\s+href="style\.css"\s*\/?>/,
      `<style>${cssContent}</style>`
    );

    // Replace script src with inline script
    htmlContent = htmlContent.replace(
      /<script\s+src="agent\.js"\s*><\/script>/,
      `<script>${jsContent}<\/script>`
    );

    const frame = document.getElementById('preview-frame');
    frame.srcdoc = htmlContent;
  },

  togglePreview() {
    const panel = document.getElementById('preview-panel');
    const editor = document.getElementById('editor-container');

    if (panel.classList.contains('active')) {
      panel.classList.remove('active');
      editor.style.display = 'flex';
    } else {
      this.preview();
      panel.classList.add('active');
      editor.style.display = 'none';
    }
  },

  // ═══════════════ COPY CODE ═══════════════
  copyCode() {
    const code = document.getElementById('code-editor').value;
    navigator.clipboard.writeText(code).then(() => {
      showToast('📋 Código copiado para a área de transferência!');
    }).catch(() => {
      // Fallback
      const textarea = document.createElement('textarea');
      textarea.value = code;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast('📋 Código copiado!');
    });
  },

  // ═══════════════ FORMAT CODE ═══════════════
  formatCode() {
    const editor = document.getElementById('code-editor');
    let code = editor.value;

    if (this.activeFile?.endsWith('.html') || this.activeFile?.endsWith('.htm')) {
      code = formatHTML(code);
    } else if (this.activeFile?.endsWith('.css')) {
      code = formatCSS(code);
    } else if (this.activeFile?.endsWith('.js')) {
      code = formatJS(code);
    }

    editor.value = code;
    updateLineNumbers();
    showToast('✨ Código formatado!');
  },

  // ═══════════════ DOWNLOAD ═══════════════
  downloadProject() {
    const filename = this.activeFile;
    const content = document.getElementById('code-editor').value;
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    showToast(`⬇ Baixado: ${filename}`);
  },

  // ═══════════════ NEW FILE MODAL ═══════════════
  newFile() {
    const name = document.getElementById('new-filename').value.trim();
    if (!name) return;

    const ext = name.split('.').pop().toLowerCase();
    const langMap = {
      html: 'html', htm: 'html', css: 'css',
      js: 'javascript', json: 'json', md: 'md'
    };

    this.files[name] = {
      language: langMap[ext] || 'text',
      content: `// ${name}\n// Criado com Agent IDE OS\n`
    };

    closeModal();
    this.renderFileTree();
    this.openFile(name);
    showToast(`+ Criado: ${name}`);
  },

  // ═══════════════ TOGGLE SIDEBAR ═══════════════
  toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
  },

  // ═══════════════ TOGGLE CONSOLE ═══════════════
  toggleConsole() {
    const panel = document.getElementById('console-panel');
    panel.classList.toggle('collapsed');
    this.consoleCollapsed = panel.classList.contains('collapsed');
  },

  // ═══════════════ CONSOLE LOG ═══════════════
  log(message, type = '') {
    const output = document.getElementById('console-output');
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    const timestamp = new Date().toLocaleTimeString();
    entry.textContent = `[${timestamp}] ${message}`;
    output.appendChild(entry);
    output.scrollTop = output.scrollHeight;
  }
};

    if (cmd === 'fim' || cmd === 'exit' || cmd === 'sair') {
      IDE.log('Encerrando sessão do Agent...', 'warning');
      return 'Sessão encerrada. Recarregue para reiniciar.';

      return this.createSite(input);

      return this.addMenu();

      return this.darkTheme();

      return this.addSection();

    if (cmd.includes('adicionar botão') || cmd.includes('criar botão') || cmd.includes('button')) {
      return this.addButton();

    if (cmd.includes('adicionar imagem') || cmd.includes('criar imagem') || cmd.includes('imagem') || cmd.includes('img')) {

    if (cmd.includes('adicionar card') || cmd.includes('criar card') || cmd.includes('cartão')) {

      return this.addSidebar();

    if (cmd.includes('adicionar animação') || cmd.includes('animar') || cmd.includes('animação')) {
      return this.addAnimation();

    if (cmd.includes('adicionar navbar') || cmd.includes('criar navbar') || cmd.includes('navegação')) {
      return this.addNavbar();
    }

    if (cmd.includes('responsivo') || cmd.includes('responsive') || cmd.includes('mobile')) {
      return this.addResponsive();
    }

    // Comandos de edição
    if (cmd.includes('limpar') || cmd.includes('clear')) {
      document.getElementById('console-output').innerHTML = '';
      return 'Console limpo.';
    }

    if (cmd.includes('abrir arquivo') || cmd.includes('abrir') || cmd.includes('switch')) {
      const match = cmd.match(/abrir\s+(.+)/);
      if (match) {
        const file = match[1].trim();
        for (let key of Object.keys(IDE.files)) {
          if (key.toLowerCase().includes(file)) {
            IDE.openFile(key);
            return `Arquivo aberto: ${key}`;
          }
        }
        return `Arquivo não encontrado: ${file}`;
      }
    }

    // Comando genérico para gerar código
    if (cmd.startsWith('gerar') || cmd.startsWith('criar') || cmd.startsWith('adicionar') || cmd.startsWith('fazer')) {
      return this.genericCommand(input);

// FORMATTERS
// ══════════════════════════════════════════════════════════════════

function formatHTML(code) {
  // Simple HTML formatter
  let formatted = '';
  let indent = 0;
  const lines = code.replace(/>\s*</g, '>\n<').split('\n');

  for (let line of lines) {
    line = line.trim();
    if (!line) continue;

    if (line.startsWith('</')) indent = Math.max(0, indent - 1);

    formatted += '  '.repeat(indent) + line + '\n';

    if (line.startsWith('<') && !line.startsWith('</') && !line.startsWith('<!')
        && !line.startsWith('<br') && !line.startsWith('<hr') && !line.startsWith('<img')
        && !line.endsWith('/>')) {
      indent++;
    }
  }

  return formatted.trim();
}

function formatCSS(code) {
  // Simple CSS formatter
  return code
    .replace(/\s*{\s*/g, ' {\n  ')
    .replace(/\s*}\s*/g, '\n}\n\n')
    .replace(/;\s*/g, ';\n  ')
    .replace(/\n\s*\n/g, '\n');
}

function formatJS(code) {
  // Simple JS formatter
  return code
    .replace(/;/g, ';\n')
    .replace(/{/g, '{\n  ')
    .replace(/}/g, '\n}')
    .replace(/\n\s*\n/g, '\n');
}

// ══════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════════════════

document.addEventListener('keydown', (e) => {
  // Tab key in editor
  const editor = document.getElementById('code-editor');
  if (e.target === editor) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
      updateLineNumbers();
    }

    // Ctrl+S - Save
    if (e.ctrlKey && e.key === 's') {
      e.preventDefault();
      IDE.files[IDE.activeFile].content = editor.value;
      showToast('💾 Arquivo salvo!');
    }

    // Ctrl+Enter - Run/Preview
    if (e.ctrlKey && e.key === 'Enter') {
      e.preventDefault();
      IDE.preview();
      showToast('▶ Preview executado!');
    }
  }

  // Escape - Close modal
  if (e.key === 'Escape') {
    closeModal();
  }

  // Ctrl+P - Quick preview
  if (e.ctrlKey && e.key === 'p') {
    e.preventDefault();
    IDE.preview();
  }

  // Ctrl+B - Toggle sidebar
  if (e.ctrlKey && e.key === 'b') {
    e.preventDefault();
    IDE.toggleSidebar();
  }

  // Ctrl+` - Toggle console
  if (e.ctrlKey && e.key === '`') {
    e.preventDefault();
    IDE.toggleConsole();
  }

  // Ctrl+Enter in agent input
  if (e.target === document.getElementById('agent-input')) {
    if (e.key === 'Enter') {
      processAgentCommand();
    }

    if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (IDE.historyIndex > 0) {
        IDE.historyIndex--;
        e.target.value = IDE.commandHistory[IDE.historyIndex] || '';
      }
    }

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (IDE.historyIndex < IDE.commandHistory.length - 1) {
        IDE.historyIndex++;
        e.target.value = IDE.commandHistory[IDE.historyIndex] || '';
      } else {
        IDE.historyIndex = IDE.commandHistory.length;
        e.target.value = '';
      }
    }
  }
});

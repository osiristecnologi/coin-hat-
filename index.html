<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Coinhat-Feeds — Memecoins Solana</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════
   COINHAT-FEEDS — ESPELHO ADAPTADO
   API: https://coinhat.onrender.com
═══════════════════════════════════ */
:root{
  --api-base: 'https://coinhat.onrender.com';
  --bg:#f4f7fc;
  --card:#ffffff;
  --yellow:#f7c600;
  --yellow-lt:#fff9e0;
  --yellow-dk:#d4a800;
  --blue:#1a6bff;
  --blue-lt:#e8f0ff;
  --blue-dk:#0d4fd4;
  --green:#16c784;
  --red:#ea3943;
  --text:#111827;
  --t2:#374151;
  --t3:#6b7280;
  --t4:#9ca3af;
  --border:rgba(0,0,0,0.07);
  --shadow:0 2px 20px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 40px rgba(26,107,255,0.13);
  --r:16px;
  --r-sm:10px;
  --glass:rgba(255,255,255,0.78);
  --glass-b:rgba(255,255,255,0.55);
  --hh:106px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font-family:inherit}
img{display:block;max-width:100%}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--yellow);border-radius:99px}

/* TOAST */
#toasts{position:fixed;bottom:24px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:11px 18px;border-radius:var(--r-sm);font-size:.83rem;font-weight:500;pointer-events:auto;opacity:0;transform:translateY(10px) scale(.97);transition:opacity .28s,transform .28s;box-shadow:0 4px 20px rgba(0,0,0,.18);max-width:260px;border-left:3px solid var(--yellow)}
.toast.show{opacity:1;transform:translateY(0) scale(1)}
.toast.success{border-color:var(--green)}
.toast.error{border-color:var(--red)}
.toast.info{border-color:var(--blue)}

/* ── HEADER ── */
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--glass);backdrop-filter:blur(20px) saturate(1.8);-webkit-backdrop-filter:blur(20px) saturate(1.8);border-bottom:1px solid var(--glass-b);box-shadow:0 1px 20px rgba(0,0,0,.05)}
.h-inner{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;gap:10px}
.h-left{display:flex;align-items:center;gap:11px}
.h-right{display:flex;align-items:center;gap:8px}
.hamburger{display:flex;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;padding:7px;border-radius:var(--r-sm);transition:background .2s}
.hamburger:hover{background:var(--yellow-lt)}
.hamburger span{display:block;height:2px;background:var(--text);border-radius:2px;transition:transform .3s,opacity .3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.brand{display:flex;align-items:center;gap:8px}
.brand-logo{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--yellow)}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.08rem;letter-spacing:-.4px;line-height:1}
.brand-accent{color:var(--blue)}
/* ... CSS continua igual ... */
</style>
</head>
<body>
<div id="toasts"></div>
<!-- ══ MENU OVERLAY ══ -->
<div id="menu-overlay" class="menu-overlay">
  <div class="menu-backdrop" id="menu-backdrop"></div>
  <aside class="menu-panel">
    <div class="menu-header">
      <div class="menu-brand">
        <img src="https://i.imgur.com/coinhat-logo.png" alt="Logo" class="brand-logo">
        <span class="brand-name">Coin<span class="brand-accent">hat</span></span>
      </div>
      <button id="menu-close" class="menu-close">×</button>
    </div>
    <nav class="menu-nav">
      <a href="#" class="menu-item active" id="menu-home">
        <span>Início</span>
      </a>
      <a href="https://twitter.com/coinhat_" target="_blank" class="menu-item">
        <span>Twitter</span>
      </a>
      <a href="https://t.me/coinhat" target="_blank" class="menu-item">
        <span>Telegram</span>
      </a>
    </nav>
  </aside>
</div>
<!-- ═══ MAIN + TOKENS ═══ -->
<main class="main">
  <section class="hero">
    <h1 class="hero-title">Memecoins <span class="accent">Solana</span></h1>
    <p class="hero-sub">Top tokens em tempo real via Coinhat</p>
    <div class="search-box">
      <input type="text" id="search" placeholder="Buscar token...">
    </div>
  </section>
  
  <section id="tokens" class="tokens-grid">
    <div class="loading">Carregando tokens...</div>
  </section>
</main>

<script>
const API = 'https://coinhat.onrender.com';
const $ = s => document.querySelector(s);
let allTokens = [];

// MENU
$('#menu-btn').onclick = () => $('#menu-overlay').classList.add('show');
$('#menu-backdrop').onclick = $('#menu-close').onclick = () => $('#menu-overlay').classList.remove('show');

// TOAST
function toast(msg, err=false) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:20px;right:20px;background:${err?'#ea3943':'#111'};color:#fff;padding:12px 16px;border-radius:8px;z-index:9999`;
  $('#toasts').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// CARREGA TOKENS
async function loadTokens() {
  try {
    const res = await fetch(`${API}/api/coins`);
    const data = await res.json();
    allTokens = data.tokens || data;
    render(allTokens);
  } catch(e) {
    $('#tokens').innerHTML = `<div class="error">API offline. CORS?</div>`;
    toast('Erro na API', true);
  }
}

function render(list) {
  if (!list.length) return $('#tokens').innerHTML = '<div class="empty">Nenhum token</div>';
  $('#tokens').innerHTML = list.map(t => `
    <div class="token-card" onclick="swap('${t.address}','${t.symbol}')">
      <div class="token-top">
        <img src="${t.logo||'https://placehold.co/40'}" width="40" height="40" style="border-radius:50%">
        <div>
          <div class="token-name">${t.name}</div>
          <div class="token-symbol">$${t.symbol}</div>
        </div>
      </div>
      <div class="token-price">$${Number(t.price).toFixed(6)}</div>
      <div class="token-change" style="color:${t.change24h>=0?'#16c784':'#ea3943'}">
        ${t.change24h>=0?'▲':'▼'} ${Math.abs(t.change24h).toFixed(2)}%
      </div>
    </div>
  `).join('');
}

// SWAP
async function swap(address, symbol) {
  toast(`Abrindo swap de ${symbol}...`);
  try {
    const res = await fetch(`${API}/api/swap`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ outputMint: address, amount: 0.1 })
    });
    const {url} = await res.json();
    if(url) window.open(url,'_blank');
    else throw new Error();
  } catch(e) {
    toast('Erro no swap', true);
  }
}

// BUSCA
$('#search').oninput = e => {
  const q = e.target.value.toLowerCase();
  render(allTokens.filter(t => 
    t.name.toLowerCase().includes(q) || 
    t.symbol.toLowerCase().includes(q)
  ));
};

loadTokens();
setInterval(loadTokens, 30000);
</script>
</body>
</html>
